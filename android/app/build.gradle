plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

def kotlin_version = "2.2.0"

def readProperties = { f ->
    def map = [:]
    if (f.exists()) {
        f.withReader('UTF-8') { reader ->
            reader.readLines().each { line ->
                if (line.contains('=')) {
                    def (key, value) = line.split('=', 2).collect { it != null ? it.trim() : '' }
                    map[key] = value
                }
            }
        }
    }
    return map
}

def localProperties = readProperties(rootProject.file('local.properties'))
def flutterVersionCode = localProperties['flutter.versionCode'] ?: '1'
def flutterVersionName = localProperties['flutter.versionName'] ?: '1.0'

def keystoreProperties = readProperties(rootProject.file('key.properties'))

android {

    compileSdkVersion 36
    ndkVersion "27.0.12077973"
    namespace "nakajimamasao.appstudio.allowancetracker"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "nakajimamasao.appstudio.allowancetracker"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}

allprojects {
    gradle.projectsEvaluated {
        tasks.withType(JavaCompile) {
            options.compilerArgs << "-Xlint:unchecked" << "-Xlint:deprecation"
        }
    }
}
