pluginManagement {
    def flutterSdkPath = {
        def props = [:]
        file("local.properties").withReader('UTF-8') { reader ->
            reader.readLines().each { line ->
                if (line.contains('=')) {
                    def (key, value) = line.split('=', 2).collect { it != null ? it.trim() : '' }
                    props[key] = value
                }
            }
        }
        def sdkPath = props["flutter.sdk"]
        assert sdkPath != null, "flutter.sdk not set in local.properties"
        return sdkPath
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("com.android.application") version "8.13.2" apply false
    id("com.android.library") version "8.13.2" apply false
    id "org.jetbrains.kotlin.android" version "2.3.10" apply false
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.google.gms.google-services" version "4.4.4" apply false
    id "com.google.firebase.crashlytics" version "3.0.6" apply false
}

include ':app'
